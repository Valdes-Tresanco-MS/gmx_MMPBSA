name: gmxMMPBSA
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Dependency compatibility smoke tests, run with gmx_MMPBSA_test:
  # - conda-forge ambertools 23.6 + gromacs 2025.4 passed -t 1 (12/12)
  #   with numpy 1.26.4, scipy 1.14.1, pandas 2.2.3, matplotlib 3.8.4,
  #   seaborn 0.13.2, mpi4py 4.0.1, and parmed 4.2.2.
  # - conda-forge ambertools 24.8 + gromacs 2025.4 passed -t 3 4 5 (3/3)
  #   with the same Python 3.11 stack.
  # - dacase::ambertools-dac 25.3.0 passed -t 3 4 5 (3/3), but only in an
  #   experimental Python 3.12 env after bypassing the current setup.py Python
  #   guard in a temporary source copy. Treat AmberTools-DAC >=25 support as
  #   promising but not formal until Python 3.12 support is validated.
  # - dacase::ambertools-dac 26.0.0 was not smoke-tested; package resolution
  #   requires a newer OpenMPI/runtime stack and did not converge quickly.
  - numpy=1.26.4
  - ambertools<24
  - mpi4py=4.0.1
  - matplotlib=3.7.3
  - scipy=1.14.1
  - parmed<5


  - pandas=1.5.3
  - seaborn=0.11.2
  - tqdm

  - git
  - gromacs<2026
  - pip:
      - pyqt6==6.7.1
    
